<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💰 إربح 50 دولار للساعة</title>
    <style>
        /* Reset أساسي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 16px 0;
            margin: 0;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 40px;
            padding: 25px 24px 30px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.1) inset;
            text-align: center;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        /* أيقونة أو إيموجي كبير */
        .emoji-badge {
            font-size: 75px;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 8px #00000066);
            transform: scale(1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* العنوان الرئيسي */
        h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.3;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            margin-bottom: 25px;
        }

        .price-highlight {
            background: linear-gradient(135deg, #f5e56b, #f9c74f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 52px;
            font-weight: 900;
            display: inline-block;
            padding: 0 4px;
            text-shadow: 0 0 15px #f5b34280;
        }

        .btn-wrapper {
            margin: 15px 0 0;
        }

        /* الزر الأصفر المتحرك مع الصورة */
        .cta-button {
            display: flex; /* استخدام flex لتوسيط الصورة */
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(145deg, #FFD700, #FDB913, #FFA500); /* تدرج أصفر */
            color: white;
            font-size: 42px;
            font-weight: 900;
            padding: 15px 20px; /* تقليل الحشوة العلوية والسفلية قليلاً */
            border-radius: 100px;
            text-decoration: none;
            box-shadow: 0 15px 25px -8px rgba(255, 215, 0, 0.7), 0 4px 0 0 #B8860B, 0 0 20px #FFD700; /* ظل ذهبي */
            border: 2px solid #FFEC9E;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            animation: gentle-shake 2s ease-in-out infinite;
            min-height: 80px; /* ضمان ارتفاع مناسب للصورة */
        }

        /* تنسيق الصورة داخل الزر */
        .cta-button img {
            max-width: 120px; /* حجم الصورة - يمكنك تعديله */
            height: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            transition: transform 0.2s ease;
        }

        .cta-button:active img {
            transform: scale(0.95);
        }

        /* حركة اهتزاز خفيفة */
        @keyframes gentle-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50% { transform: translateX(-2px); }
            20%, 40%, 60% { transform: translateX(2px); }
            70% { transform: translateX(0); }
        }

        .cta-button:active {
            transform: translateY(5px);
            box-shadow: 0 8px 20px -4px #B8860B, 0 2px 0 0 #8B6910, 0 0 30px #FFD700;
            animation: none;
        }

        /* تحسين شاشات صغيرة جداً */
        @media (max-width: 380px) {
            body { padding: 15px 16px 0; }
            .card { padding: 20px 16px 25px; margin-top: 5px; }
            h1 { font-size: 34px; }
            .price-highlight { font-size: 42px; }
            .cta-button { padding: 12px 15px; min-height: 70px; }
            .cta-button img { max-width: 100px; }
            .emoji-badge { font-size: 65px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- أيقونة ملفتة -->
        <div class="emoji-badge">
            💰💵
        </div>

        <!-- العنوان الرئيسي -->
        <h1>
            إربح <span class="price-highlight">50 دولار</span> <br>
            للساعة
        </h1>

        <!-- الزر الأصفر مع صورة السهم -->
        <div class="btn-wrapper">
            <a href="https://said-tv.com/%d8%b1%d8%a8%d8%ad-%d8%a3%d9%83%d8%ab%d8%b1-%d9%85%d9%86-50-%d8%af%d9%88%d9%84%d8%a7%d8%b1-%d9%84%d9%84%d8%b3%d8%a7%d8%b9%d8%a9-%d9%88%d8%a8%d8%af%d9%88%d9%86-%d8%b1%d8%a3%d8%b3_%d9%85%d8%a7%d9%84/" 
               class="cta-button" 
               target="_blank" 
               rel="noopener noreferrer">
                <img src="https://said-tv.com/wp-content/uploads/2026/03/png-clipart-arrow-computer-icons-indicator-arrows-angle-triangle-removebg-preview.png" 
                     alt="سهم التوجيه" 
                     width="150" height="75">
            </a>
        </div>
    </div>

</body>
</html>
