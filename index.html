<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💰 طريقة حقيقية لكسب 50$ للساعة</title>
    <style>
        /* Reset أساسي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 16px 0;
            margin: 0;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 40px;
            padding: 25px 24px 30px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.1) inset;
            text-align: center;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        /* أيقونة أو إيموجي كبير */
        .emoji-badge {
            font-size: 75px;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 8px #00000066);
            transform: scale(1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* العنوان الرئيسي */
        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.4;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        .price-highlight {
            background: linear-gradient(135deg, #f5e56b, #f9c74f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 42px;
            font-weight: 900;
            display: inline-block;
            padding: 0 4px;
            text-shadow: 0 0 15px #f5b34280;
        }

        .btn-wrapper {
            margin: 15px 0 0;
        }

        /* الزر البنفسجي المتحرك */
        .cta-button {
            display: inline-block;
            width: 100%;
            background: linear-gradient(145deg, #a855f7, #8b5cf6, #7c3aed);
            color: white;
            font-size: 32px;
            font-weight: 900;
            padding: 20px 20px;
            border-radius: 100px;
            text-decoration: none;
            box-shadow: 0 15px 25px -8px rgba(124, 58, 237, 0.7), 0 4px 0 0 #5b21b6, 0 0 20px #c084fc;
            border: 2px solid #e9d5ff;
            transition: all 0.15s ease;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
            animation: gentle-shake 2s ease-in-out infinite;
        }

        /* حركة اهتزاز خفيفة */
        @keyframes gentle-shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50% { transform: translateX(-2px); }
            20%, 40%, 60% { transform: translateX(2px); }
            70% { transform: translateX(0); }
        }

        .cta-button:active {
            transform: translateY(5px);
            box-shadow: 0 8px 20px -4px #5b21b6, 0 2px 0 0 #3b0764, 0 0 30px #c084fc;
            animation: none;
        }

        .cta-button span {
            font-size: 36px;
            margin: 0 8px;
            filter: drop-shadow(0 2px 3px black);
            vertical-align: middle;
            color: #ffffff;
        }

        /* تحسين شاشات صغيرة جداً */
        @media (max-width: 380px) {
            body { padding: 15px 16px 0; }
            .card { padding: 20px 16px 25px; margin-top: 5px; }
            h1 { font-size: 28px; }
            .price-highlight { font-size: 36px; }
            .cta-button { font-size: 26px; padding: 16px; }
            .cta-button span { font-size: 30px; }
            .emoji-badge { font-size: 65px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- أيقونة ملفتة -->
        <div class="emoji-badge">
            💰💵
        </div>

        <!-- العنوان الرئيسي -->
        <h1>
            طريقة حقيقية <br> لكسب <span class="price-highlight">50$</span> للساعة
        </h1>

        <!-- الزر البنفسجي المتحرك مع النص الجديد -->
        <div class="btn-wrapper">
            <a href="https://said-tv.com/%d8%b1%d8%a8%d8%ad-%d8%a3%d9%83%d8%ab%d8%b1-%d9%85%d9%86-50-%d8%af%d9%88%d9%84%d8%a7%d8%b1-%d9%84%d9%84%d8%b3%d8%a7%d8%b9%d8%a9-%d9%88%d8%a8%d8%af%d9%88%d9%86-%d8%b1%d8%a3%d8%b3_%d9%85%d8%a7%d9%84/" 
               class="cta-button" 
               target="_blank" 
               rel="noopener noreferrer">
                <span>$</span> اكتشف مجانًا <span>$</span>
            </a>
        </div>
    </div>

</body>
</html>
