<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💰 إربح 50 دولار للساعة - بدون رأس مال</title>
    <style>
        /* Reset أساسي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 40px;
            padding: 30px 24px 36px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.1) inset;
            text-align: center;
            transition: all 0.2s ease;
        }

        /* أيقونة أو إيموجي كبير */
        .emoji-badge {
            font-size: 80px;
            line-height: 1;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 8px #00000066);
            transform: scale(1);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.3;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            margin-bottom: 10px;
        }

        .price-highlight {
            background: linear-gradient(135deg, #f5e56b, #f9c74f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 42px;
            font-weight: 900;
            display: inline-block;
            padding: 0 4px;
            text-shadow: 0 0 15px #f5b34280;
        }

        .sub-text {
            font-size: 24px;
            color: #fdeaa8;
            margin-top: -5px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .btn-wrapper {
            margin: 25px 0 0;
        }

        .cta-button {
            display: inline-block;
            width: 100%;
            background: linear-gradient(145deg, #ffd966, #f2b807);
            color: #0a0f1a;
            font-size: 28px;
            font-weight: 900;
            padding: 22px 20px;
            border-radius: 100px;
            text-decoration: none;
            box-shadow: 0 20px 30px -8px #000000cc, 0 4px 0 0 #9e6d0e, 0 0 20px #ffd966;
            border: 2px solid #fff4be;
            transition: all 0.15s ease;
            text-shadow: 0 2px 4px #ffffff70;
            -webkit-tap-highlight-color: transparent;
        }

        .cta-button:active {
            transform: translateY(5px);
            box-shadow: 0 8px 20px -4px #000000, 0 2px 0 0 #9e6d0e, 0 0 30px #ffdb7c;
        }

        .cta-button span {
            font-size: 34px;
            margin-left: 10px;
            filter: drop-shadow(0 2px 2px black);
            vertical-align: middle;
        }

        /* تحسين شاشات صغيرة جداً */
        @media (max-width: 380px) {
            .card { padding: 22px 16px; }
            h1 { font-size: 28px; }
            .price-highlight { font-size: 36px; }
            .sub-text { font-size: 20px; }
            .cta-button { font-size: 24px; padding: 18px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- أيقونة ملفتة -->
        <div class="emoji-badge">
            💰💵
        </div>

        <!-- العنوان الرئيسي -->
        <h1>
            إربح <span class="price-highlight">50 دولار</span> <br>
            للساعة
        </h1>
        <div class="sub-text">
            وبدون رأس مال 💸
        </div>

        <!-- الزر الرئيسي -->
        <div class="btn-wrapper">
            <a href="https://said-tv.com/%d8%b1%d8%a8%d8%ad-%d8%a3%d9%83%d8%ab%d8%b1-%d9%85%d9%86-50-%d8%af%d9%88%d9%84%d8%a7%d8%b1-%d9%84%d9%84%d8%b3%d8%a7%d8%b9%d8%a9-%d9%88%d8%a8%d8%af%d9%88%d9%86-%d8%b1%d8%a3%d8%b3_%d9%85%d8%a7%d9%84/" 
               class="cta-button" 
               target="_blank" 
               rel="noopener noreferrer">
                <span>💰</span> إضغط هنا للتفاصيل <span>💰</span>
            </a>
        </div>
    </div>

</body>
</html>
